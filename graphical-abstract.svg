<svg width="680" height="500" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <title>rster4llm graphical abstract</title>
  <desc>Raw geospatial data (raster and vector) is compressed via three routes — statistical summaries, geospatial foundation model embeddings, and WKT/TOON serialization — to fit the bounded context window of an LLM, which accesses full-detail data through function calling over cloud-native ground-truth storage, never raw pixels.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/>
    </marker>
  </defs>
  <rect x="0.5" y="0.5" width="679" height="499" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
  <polygon points="165,95 480,185 480,205 165,290" fill="#9CA3AF" opacity="0.15"/>
  <text x="110" y="60" text-anchor="middle" font-size="14" font-weight="600" fill="#1F2937">Raw data</text>
  <text x="110" y="78" text-anchor="middle" font-size="12" fill="#6B7280">raster + vector</text>
  <g opacity="0.9">
    <rect x="65" y="90" width="17" height="17" fill="#4C9A6B"/><rect x="83" y="90" width="17" height="17" fill="#4C9A6B"/><rect x="101" y="90" width="17" height="17" fill="#8FBF7F"/><rect x="119" y="90" width="17" height="17" fill="#D9A441"/><rect x="137" y="90" width="17" height="17" fill="#D9A441"/>
    <rect x="65" y="108" width="17" height="17" fill="#4C9A6B"/><rect x="83" y="108" width="17" height="17" fill="#8FBF7F"/><rect x="101" y="108" width="17" height="17" fill="#D9A441"/><rect x="119" y="108" width="17" height="17" fill="#D9A441"/><rect x="137" y="108" width="17" height="17" fill="#D9A441"/>
    <rect x="65" y="126" width="17" height="17" fill="#5B9BD5"/><rect x="83" y="126" width="17" height="17" fill="#4C9A6B"/><rect x="101" y="126" width="17" height="17" fill="#4C9A6B"/><rect x="119" y="126" width="17" height="17" fill="#D9A441"/><rect x="137" y="126" width="17" height="17" fill="#8FBF7F"/>
    <rect x="65" y="144" width="17" height="17" fill="#5B9BD5"/><rect x="83" y="144" width="17" height="17" fill="#5B9BD5"/><rect x="101" y="144" width="17" height="17" fill="#4C9A6B"/><rect x="119" y="144" width="17" height="17" fill="#4C9A6B"/><rect x="137" y="144" width="17" height="17" fill="#4C9A6B"/>
    <rect x="65" y="162" width="17" height="17" fill="#5B9BD5"/><rect x="83" y="162" width="17" height="17" fill="#5B9BD5"/><rect x="101" y="162" width="17" height="17" fill="#8FBF7F"/><rect x="119" y="162" width="17" height="17" fill="#4C9A6B"/><rect x="137" y="162" width="17" height="17" fill="#4C9A6B"/>
  </g>
  <polygon points="80,205 140,200 155,240 120,275 75,260" fill="#0D9488" opacity="0.15"/>
  <polygon points="80,205 140,200 155,240 120,275 75,260" fill="none" stroke="#0D9488" stroke-width="1.5"/>
  <circle cx="80" cy="205" r="2.5" fill="#0D9488"/><circle cx="140" cy="200" r="2.5" fill="#0D9488"/><circle cx="155" cy="240" r="2.5" fill="#0D9488"/><circle cx="120" cy="275" r="2.5" fill="#0D9488"/><circle cx="75" cy="260" r="2.5" fill="#0D9488"/>
  <circle cx="112" cy="237" r="4" fill="#E07A5F"/>
  <text x="110" y="306" text-anchor="middle" font-size="12" fill="#6B7280">serialized</text>
  <text x="110" y="322" text-anchor="middle" font-size="12" fill="#6B7280">≈ 60,000 tokens</text>
  <text x="340" y="84" text-anchor="middle" font-size="12" fill="#6B7280">100–400× compression</text>
  <g>
    <rect x="233" y="95" width="214" height="52" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="0.75"/>
    <text x="340" y="117" text-anchor="middle" font-size="14" font-weight="600" fill="#92400E">Statistical summary</text>
    <text x="340" y="135" text-anchor="middle" font-size="12" fill="#B45309">~150 tokens per scene</text>
  </g>
  <g>
    <rect x="233" y="163" width="214" height="52" rx="8" fill="#F3E8FF" stroke="#9333EA" stroke-width="0.75"/>
    <text x="340" y="185" text-anchor="middle" font-size="14" font-weight="600" fill="#6B21A8">GeoFM embeddings</text>
    <text x="340" y="203" text-anchor="middle" font-size="12" fill="#7E22CE">Clay · Prithvi · 768-d</text>
  </g>
  <g>
    <rect x="233" y="231" width="214" height="52" rx="8" fill="#CCFBF1" stroke="#0D9488" stroke-width="0.75"/>
    <text x="340" y="253" text-anchor="middle" font-size="14" font-weight="600" fill="#115E59">WKT + TOON</text>
    <text x="340" y="271" text-anchor="middle" font-size="12" fill="#0F766E">2.3× fewer tokens than JSON</text>
  </g>
  <line x1="484" y1="195" x2="506" y2="195" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <g>
    <rect x="510" y="130" width="130" height="130" rx="14" fill="#FCE7F3" stroke="#DB2777" stroke-width="0.75"/>
    <text x="575" y="161" text-anchor="middle" font-size="14" font-weight="600" fill="#9D174D">LLM</text>
    <rect x="524" y="176" width="12" height="12" rx="2" fill="#D9A441"/>
    <rect x="539" y="176" width="12" height="12" rx="2" fill="#D9A441"/>
    <rect x="554" y="176" width="12" height="12" rx="2" fill="#9B6DD7"/>
    <rect x="569" y="176" width="12" height="12" rx="2" fill="#9B6DD7"/>
    <rect x="584" y="176" width="12" height="12" rx="2" fill="#0D9488"/>
    <rect x="599" y="176" width="12" height="12" rx="2" fill="#0D9488"/>
    <rect x="614" y="176" width="12" height="12" rx="2" fill="#9CA3AF" opacity="0.5"/>
    <text x="575" y="214" text-anchor="middle" font-size="12" fill="#BE185D">bounded context</text>
  </g>
  <path d="M 575 264 L 575 415 L 392 415" fill="none" stroke="#6B7280" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="480" y="402" text-anchor="middle" font-size="12" fill="#6B7280">function calling</text>
  <text x="480" y="438" text-anchor="middle" font-size="12" fill="#6B7280">never raw pixels</text>
  <path d="M 110 332 L 110 415 L 250 415" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <g>
    <rect x="260" y="392" width="120" height="50" rx="10" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="0.75"/>
    <ellipse cx="320" cy="392" rx="60" ry="11" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="0.75"/>
    <text x="320" y="427" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Ground truth</text>
  </g>
  <text x="320" y="466" text-anchor="middle" font-size="12" fill="#6B7280">COG · STAC · PostGIS</text>
</svg>
